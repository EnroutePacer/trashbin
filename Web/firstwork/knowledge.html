<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渊海微澜 - Knowledge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #page-transition {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ocean-deep); z-index: 9999; opacity: 1; pointer-events: none; transition: opacity 0.8s ease;
        }
        #page-transition.loaded { opacity: 0; }
        .academic-page-spacer { padding-top: 120px; background-color: var(--ocean-deep); transition: background-color 0.5s ease; }
        .long-text-module { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 5rem; }
        .long-text-module h3 { font-size: 2rem; color: var(--title-color); border-bottom: 2px solid var(--accent); padding-bottom: 1rem; }
        .long-text-module p { font-size: 1.1rem; line-height: 2; margin-bottom: 1rem; color: var(--text-primary); text-indent: 2em; text-align: justify; }
        .long-text-module img { width: 100%; max-height: 500px; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin: 2rem 0; opacity: 0.85; transition: opacity 0.3s; }
        .long-text-module img:hover { opacity: 1; }
    </style>
</head>
<body>
    
    <div id="page-transition"></div>
    <nav class="navbar">
        <a href="index.html" style="text-decoration: none;"><div class="logo" data-i18n="nav.title">渊海微澜</div></a>
        <ul class="nav-links">
            <!-- 中间的跳转被移除了，按照要求 -->
        </ul>
        <div class="settings-menu" id="settings-menu">
            <div class="settings-btn" id="settings-btn">
                <span>☰</span> <i class="arrow"></i>
            </div>
            <div class="settings-dropdown" id="settings-dropdown">
                <div class="settings-dropdown-inner">
                    <div class="dropdown-item">
                        <span data-i18n="menu.theme">主题</span>
                        <button id="theme-toggle" class="ctrl-btn-small">⚪</button>
                    </div>
                    <div class="dropdown-item">
                        <span data-i18n="menu.lang">语言</span>
                        <button id="lang-toggle" class="ctrl-btn-small">EN</button>
                    </div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item">
                        <a href="knowledge.html" class="login-link">
                            <span data-i18n="nav.dropdown.knowledge">知识谱系</span>
                            <span class="arrow-right">→</span>
                        </a>
                    </div>
                    <div class="dropdown-item">
                        <a href="academic.html" class="login-link">
                            <span data-i18n="nav.dropdown.academic">学术长廊</span>
                            <span class="arrow-right">→</span>
                        </a>
                    </div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item">
                        <a href="login.html" class="login-link" id="login-link">
                            <span data-i18n="menu.login">登录</span>
                            <span class="arrow-right">→</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="academic-page-spacer"></div>

    <section class="section-dark" style="padding-top: 4rem;">
        <h1 class="section-title" data-i18n="page.knowledge.header" style="font-size: 3rem; margin-bottom: 4rem;">谱系：起源与演变</h1>
        
        <div class="module-container" style="max-width: 1000px; margin: 0 auto; flex-direction: column;">
            
            <div class="long-text-module tide-slide">
                <h3 data-i18n="page.knowledge.mod1.title">第一模块：Our ocean, our ancestor</h3>
                
                <!--待更换图片三个-->

                <img src="photos/p_ancientsea.png" alt="Ocean Origin">
                <p data-i18n="page.knowledge.mod1.p1">数十亿年前的原始地球...</p>
                <p data-i18n="page.knowledge.mod1.p2">在宏大的洋流带系统中...</p>
            </div>

            <div class="long-text-module tide-slide">
                <h3 data-i18n="page.knowledge.mod2.title">第二模块：Life of ocean</h3>
                <img src="photos/p_seavolcanael.png" alt="Marine Life">
                <p data-i18n="page.knowledge.mod2.p1">生命的火种最初...</p>
                <p data-i18n="page.knowledge.mod2.p2">在漫长的演化进程中...</p>
            </div>

            <div class="long-text-module tide-slide">
                <h3 data-i18n="page.knowledge.mod3.title">第三模块：Crisis</h3>
                <img src="photos/p_emission.jpg" alt="Ocean Crisis">
                <p data-i18n="page.knowledge.mod3.p1">即便如此深邃与广阔...</p>
                <p data-i18n="page.knowledge.mod3.p2">工业文明带来巨额...</p>
            </div>

        </div>
    </section>

    <footer class="footer">
        <p data-i18n="footer.text">© 2026 渊海微澜. 保留所有权利. | 让深蓝不息流淌</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
